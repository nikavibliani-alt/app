            ${kd.occupancyPct>0?`<path d="M 16 86 A 64 64 0 0 1 144 86" stroke="var(--accent)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="${(kd.occupancyPct/100*201.1).toFixed(1)} 201.1" pathLength="201.1"/>`:''}
            <text x="80" y="74" text-anchor="middle" font-family="'DM Mono',monospace" font-size="24" font-weight="700" fill="var(--text)">${kd.occupancyPct}%</text>
            <text x="80" y="90" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="var(--hint)">${kd.occupiedCount} / ${kd.TOTAL_CAPACITY} KEYS</text>
          </svg>
        </div>
        <div class="occ-breakdown">
          ${kd.roomTypeOcc.map(g=>{
            const pct=g.total?Math.round(g.occ/g.total*100):0;
            return `<div class="occ-row"><span class="occ-label">${g.label}</span><div class="occ-track"><div class="occ-fill" style="width:${pct}%"></div></div><span class="occ-val">${g.occ}/${g.total}</span></div>`;
          }).join('')}

    </div>

    <div class="dash-row dash-row-pace">
      <div class="dash-card">
        <div class="dash-card-head">
          <div><div class="dash-card-title">Pickup Pace</div><div class="dash-card-sub">Next 14 nights · rooms on books of ${CAPACITY}</div></div>
        </div>
        <div class="pace-chart">${paceColsHTML}</div>
        <div class="pace-axis">${paceAxisHTML}</div>
      </div>

      <div class="dash-card">
        <div class="dash-card-head">
          <div><div class="dash-card-title">Channel Mix</div><div class="dash-card-sub">Last 90 days · reservations</div></div>
        </div>
        <div class="chan-donut-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0;">
            <circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="12"/>
            ${donutSegs||`<circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--border)" stroke-width="12"/>`}
            <text x="60" y="56" text-anchor="middle" font-family="'DM Mono',monospace" font-size="14" font-weight="700" fill="var(--text)">${kd.srcTotal}</text>
            <text x="60" y="70" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="var(--hint)">BOOKINGS</text>
          </svg>
          <div class="chan-list">
            ${chanRows.length?chanRows.map(c=>`<div class="chan-row"><span class="chan-swatch" style="background:${c.color}"></span><span class="chan-name">${c.label}</span><span class="chan-pct">${c.pct}%</span></div>`).join(''):'<div style="font-size:12px;color:var(--hint);">No data yet</div>'}

let _invSettings={};

async function _loadInvSettings(){
  try{
    const snap=await getDoc(doc(db,'settings','invoice'));
    if(snap.exists()){
      _invSettings=snap.data();
      _invNextNum=(_invSettings.lastInvoiceNumber||0)+1;

function _invFmtDate(ds){
  if(!ds)return '—';
  const d=new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

    room:g('inv-room')?.value||'',

window.refreshInvPreview=function(){
  const wrap=document.getElementById('inv-preview-wrap');

};

window.selectInvRes=function(id){
  const res=reservations.find(r=>r.id===id);
  if(!res)return;
  const set=(elId,v)=>{const e=document.getElementById(elId);if(e)e.value=v;};
  set('inv-guest',res.guest||'');
  set('inv-guest-email',res.email||'');
  set('inv-checkin',res.checkin||'');
  set('inv-checkout',res.checkout||'');
  set('inv-room',res.roomCode||'');
  set('inv-price',res.price||0);
  const cur=document.getElementById('inv-currency');
  if(cur&&res.currency)cur.value=res.currency;
  window.refreshInvPreview();
};

window.sendInvEmail=async function(){
  const s=_invSettings;
  if(!s.emailjsKey||!s.emailjsService||!s.emailjsTemplate){
    showToast('Configure EmailJS settings first (save them too)');return;
  }
  const guestEmail=document.getElementById('inv-guest-email')?.value;
  if(!guestEmail){showToast('No guest email address');return;}
  const btn=document.getElementById('inv-send-btn');
  const orig=btn?.innerHTML;
  if(btn){btn.textContent='Sending…';btn.disabled=true;}
  try{
    if(typeof emailjs==='undefined')throw new Error('EmailJS SDK not loaded');
    const fields=_invReadFields();
    const nights=(fields.checkin&&fields.checkout)?Math.max(0,Math.round((parseDate(fields.checkout)-parseDate(fields.checkin))/86400000)):0;
    const subtotal=fields.price*nights;
    const tax=fields.taxEnabled?subtotal*fields.taxPct/100:0;
    const total=(subtotal+tax).toFixed(2);
    let body=(document.getElementById('inv-email-body')?.value||s.defaultEmailBody||'Dear {{guest}},\nPlease find your invoice attached.\n\nBest regards,\n{{hotel}} Team')
      .replace(/{{guest}}/g,fields.guest)
      .replace(/{{hotel}}/g,fields.coName)
      .replace(/{{checkin}}/g,fields.checkin)
      .replace(/{{checkout}}/g,fields.checkout)
      .replace(/{{inv_number}}/g,fields.invNum);
    const subject=`Your Invoice - ${fields.coName} - ${fields.invNum}`;
    const invEl=document.getElementById('inv-printable');
    emailjs.init({publicKey:s.emailjsKey});
    await emailjs.send(s.emailjsService,s.emailjsTemplate,{
      to_email:guestEmail,
      to_name:fields.guest,
      from_name:fields.coName,
      reply_to:s.email||'',
      subject,
      message:body,
      invoice_html:invEl?invEl.outerHTML:'',
      inv_number:fields.invNum,
      checkin:fields.checkin,
      checkout:fields.checkout,
      total:`${fields.currency} ${total}`,
    });
    showToast('Email sent to '+guestEmail+' ✓');
  }catch(e){
    showToast('Send failed: '+e.message);
    console.error('EmailJS error:',e);
  }finally{
    if(btn){btn.innerHTML=orig;btn.disabled=false;}
  }
};

        <div class="form-group"><label class="form-label">Company name</label><input class="form-input" id="inv-co-name" value="${esc(s.companyName||'Sleepy PMS')}" oninput="window.refreshInvPreview()"></div>
        <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="inv-co-addr" value="${esc(s.address||'')}" oninput="window.refreshInvPreview()"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="inv-co-phone" value="${esc(s.phone||'')}" oninput="window.refreshInvPreview()"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="inv-co-email" value="${esc(s.email||'')}" oninput="window.refreshInvPreview()"></div>
        </div>
        <div class="form-group"><label class="form-label">Footer text</label><input class="form-input" id="inv-footer" value="${esc(s.footerText||'Thank you for staying with us!')}" oninput="window.refreshInvPreview()"></div>
      </div>

      <!-- Invoice fields -->
      <div class="dash-card">
        <div class="dash-card-head" style="margin-bottom:.75rem;"><div class="dash-card-title">Invoice Details</div></div>
        <div class="form-group"><label class="form-label">Reservation</label>
          <select class="form-input" id="inv-res-select" onchange="window.selectInvRes(this.value)">
            <option value="">— Select reservation —</option>${resOpts}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group"><label class="form-label">Invoice #</label><input class="form-input" id="inv-number" value="${esc(numStr)}" oninput="window.refreshInvPreview()"></div>
          <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="inv-date" value="${today}" oninput="window.refreshInvPreview()"></div>
        </div>
        <div class="form-group"><label class="form-label">Guest name</label><input class="form-input" id="inv-guest" placeholder="Guest name" oninput="window.refreshInvPreview()"></div>
        <div class="form-group"><label class="form-label">Guest email</label><input type="email" class="form-input" id="inv-guest-email" placeholder="guest@email.com" oninput="window.refreshInvPreview()"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group"><label class="form-label">Check-in</label><input type="date" class="form-input" id="inv-checkin" oninput="window.refreshInvPreview()"></div>
          <div class="form-group"><label class="form-label">Check-out</label><input type="date" class="form-input" id="inv-checkout" oninput="window.refreshInvPreview()"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;">
          <div class="form-group"><label class="form-label">Room</label><input class="form-input" id="inv-room" placeholder="6-1" oninput="window.refreshInvPreview()"></div>
          <div class="form-group"><label class="form-label">Price / night</label><input type="number" class="form-input" id="inv-price" placeholder="0.00" min="0" step="0.01" oninput="window.refreshInvPreview()"></div>
          <div class="form-group"><label class="form-label">Curr.</label>
            <select class="form-input" id="inv-currency" onchange="window.refreshInvPreview()">
              <option>GEL</option><option>EUR</option><option>USD</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <label class="form-label" style="margin:0;">Tax</label>
          <input type="checkbox" id="inv-tax-toggle" onchange="window.refreshInvPreview()">
          <input type="number" class="form-input" id="inv-tax-pct" value="10" min="0" max="100" step="0.5" style="width:64px;" oninput="window.refreshInvPreview()">
          <span style="font-size:12px;color:var(--muted);">%</span>
        </div>
        <div class="form-group"><label class="form-label">Payment status</label>
          <select class="form-input" id="inv-status" onchange="window.refreshInvPreview()">
            <option>Unpaid</option><option>Paid</option><option>Partial</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Notes / remarks</label>
          <textarea class="form-input" id="inv-notes" rows="2" placeholder="Optional notes…" oninput="window.refreshInvPreview()" style="height:auto;padding-top:8px;padding-bottom:8px;resize:vertical;"></textarea>
        </div>
      </div>

      <!-- EmailJS config -->
      <div class="dash-card">
        <div class="dash-card-head" style="margin-bottom:.75rem;">
          <div class="dash-card-title">Email (EmailJS)</div>
          <button class="filter-btn" onclick="window.saveInvSettings()">Save</button>
        </div>
        <div style="font-size:11.5px;color:var(--muted);margin-bottom:.75rem;">Create a free account at <strong>emailjs.com</strong>, then paste your credentials below.</div>
        <div class="form-group"><label class="form-label">Public Key</label><input class="form-input" id="inv-ejs-key" value="${esc(s.emailjsKey||'')}" placeholder="your_public_key"></div>
        <div class="form-group"><label class="form-label">Service ID</label><input class="form-input" id="inv-ejs-svc" value="${esc(s.emailjsService||'')}" placeholder="service_xxxxxxx"></div>
        <div class="form-group"><label class="form-label">Template ID</label><input class="form-input" id="inv-ejs-tpl" value="${esc(s.emailjsTemplate||'')}" placeholder="template_xxxxxxx"></div>
        <div class="form-group">
          <label class="form-label">Email body (editable before each send)</label>
          <textarea class="form-input" id="inv-email-body" rows="5" style="height:auto;padding-top:8px;padding-bottom:8px;resize:vertical;font-size:12px;">${esc(s.defaultEmailBody||'Dear {{guest}},\n\nPlease find attached your invoice for your stay at {{hotel}} from {{checkin}} to {{checkout}}.\n\nThank you for choosing us.\n\nBest regards,\n{{hotel}} Team')}</textarea>
          <div style="font-size:10.5px;color:var(--hint);margin-top:4px;">Variables: {{guest}} {{hotel}} {{checkin}} {{checkout}} {{inv_number}}</div>
        </div>
      </div>
    </div><!-- /left -->

    <!-- RIGHT: preview -->
    <div class="dash-card" style="padding:0;overflow:hidden;position:sticky;top:80px;">
      <div class="inv-actions">
        <div class="dash-card-title">Preview</div>
        <div style="display:flex;gap:8px;">
          <button class="topbar-btn" onclick="window.downloadInvPDF()">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1.5v8M4 7l3 3 3-3M2 11.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Download PDF
          </button>
          <button class="topbar-btn primary" id="inv-send-btn" onclick="window.sendInvEmail()">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1.5 3.5l5.5 4 5.5-4M1.5 3.5h11v7.5h-11z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Send to Guest
          </button>
        </div>
      </div>
      <div class="inv-preview-wrap" id="inv-preview-wrap"></div>
    </div><!-- /right -->

  </div>
  </div>`;

  window.refreshInvPreview();
}

// ── init ──────────────────────────────────
setSyncDot('syncing','Connecting...');
_loadInvSettings(); // load invoice/company settings from Firebase
// Set up the default page structure immediately (loading screen covers it)
if(currentPage==='calendar')renderCalendarPage();
else if(currentPage==='properties')renderPropertiesPage();
// Safety fallback — always hide loading after 5 seconds no matter what
setTimeout(()=>{
  const l=document.getElementById('loading');
  if(l)l.style.display='none';
  if(currentPage==='calendar')renderGrid();
  else if(currentPage==='properties')renderPropertiesPage();
},5000);

try{
  onSnapshot(collection(db,'properties'),(snap)=>{
    try{
      properties=snap.docs.map(d=>({id:d.id,...d.data()}));
      properties.sort((a,b)=>(a.order??999)-(b.order??999)||(a.name||'').localeCompare(b.name||''));
      displayAllocation=buildDisplayAllocation();
      setSyncDot('synced','Synced');
      if(!pricingPropId&&properties.length>0)pricingPropId=properties[0].id;
      const l=document.getElementById('loading');if(l)l.style.display='none';
      if(currentPage==='properties')renderPropertiesPage();
      else if(currentPage==='calendar')renderGrid();
      else if(currentPage==='pricing')renderPricingPage();
      else if(currentPage==='dashboard')renderDashboardPage();
      else if(currentPage==='invoices')renderInvoicesPage();
    }catch(e){console.error('Properties render error:',e);const l=document.getElementById('loading');if(l)l.style.display='none';}
  },(err)=>{
    console.error('Firebase properties error:',err);
    setSyncDot('error','Offline');
    const l=document.getElementById('loading');if(l)l.style.display='none';
    document.getElementById('main').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection error</div><div class="empty-sub">${err.message||'Check connection and refresh'}</div></div>`;
  });

  onSnapshot(collection(db,'reservations'),(snap)=>{
    try{
      reservations=snap.docs.map(d=>({id:d.id,...d.data()}));
      // Skip re-render and re-allocation during an active resize — the bar is being manipulated live
      if(_resizeState)return;
      displayAllocation=buildDisplayAllocation();
      if(currentPage==='calendar')renderGrid();
      else if(currentPage==='reservations')renderReservationsPage();
      else if(currentPage==='dashboard')renderDashboardPage();
      else if(currentPage==='invoices')renderInvoicesPage();
    }catch(e){
      console.error('Reservations error:',e);
      setSyncDot('error','Render error');
      showToast('Calendar error: '+e.message);
    }
  },(err)=>{
    console.error('Reservations listener error:',err);
    setSyncDot('error','Offline');
    showToast('Firebase error: '+err.message);
  });

  onSnapshot(collection(db,'prices'),(snap)=>{
    try{
      snap.docs.forEach(d=>{prices[d.id]=d.data();});
      if(currentPage==='pricing')renderPricingPage();
    }catch(e){console.error('Prices error:',e);}
  },(err)=>console.error('Prices listener error:',err));

}catch(e){
  console.error('Firebase init error:',e);
  const l=document.getElementById('loading');if(l)l.style.display='none';
  document.getElementById('main').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to connect</div><div class="empty-sub">${e.message}</div></div>`;
}
</script>

<!-- Reservation Modal -->
<div class="modal-overlay hidden" id="res-modal-overlay" onclick="handleOverlayClick(event)">

      <button class="drawer-close" onclick="closeResModal()">×</button>
    </div>
    <div class="modal-body">

      </div>
      <div class="form-group">
        <label class="form-label">Property</label>
        <select class="form-input" id="res-property"></select>

      <div class="form-group">
        <label class="form-label">Source</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="res-source-btns">
          <button class="platform-toggle active-airbnb" data-source="airbnb" onclick="selectSource(this)">🏠 Airbnb</button>
          <button class="platform-toggle" data-source="booking" onclick="selectSource(this)">📋 Booking</button>
          <button class="platform-toggle" data-source="expedia" onclick="selectSource(this)">✈️ Expedia</button>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

        </div>
        <div class="form-group">
          <label class="form-label">Currency</label>
          <select class="form-input" id="res-currency">
            <option value="USD">USD</option>
            <option value="GEL">GEL</option>

          </select>

      <div class="form-group">
        <label class="form-label">Notes</label>

      <div id="res-total-wrap" style="background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--accent);font-family:'DM Mono',monospace;display:none;">
        Total: <span id="res-total">—</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger hidden" id="res-delete-btn" onclick="deleteReservation()">Delete</button>
      <button class="btn" onclick="closeResModal()">Cancel</button>
      <button class="btn primary" onclick="saveReservation()">Save reservation</button>
    </div>
  </div>
</div>
