<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maxela — Check-in Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f6f4;--surface:#fff;--surface2:#f0eeeb;
  --border:#e2dfd9;--border2:#c8c3bb;
  --text:#1e1c1a;--muted:#6e6b66;--hint:#aea9a2;
  --accent:#3d6b5a;--accent-bg:#f0f6f3;--accent-border:#9ec9b8;
  --green:#2d6a4f;--green-bg:#f0f7f4;--green-border:#95d5b2;
  --red:#922b21;--red-bg:#fdf2f2;--red-border:#f5a9a0;
  --amber:#7a5a0a;--amber-bg:#fdf8ee;--amber-border:#e8c97a;
  --blue:#1d4ed8;--blue-bg:#eff4ff;--blue-border:#bfcffa;
  --r:10px;--rs:7px;--rsm:4px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;padding-bottom:4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.02em;}
.logo span{color:var(--accent);}
.admin-badge{font-size:11px;font-weight:600;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);padding:3px 10px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;}

.tabs{display:flex;gap:2px;padding:0 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

.main{max-width:900px;margin:0 auto;padding:1.5rem;}
.page{animation:fadeIn 0.2s ease;}

/* Cards */
.section-title{font-size:16px;font-weight:600;margin-bottom:1rem;letter-spacing:-0.01em;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.card-header{padding:0.85rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);}
.card-title{font-size:14px;font-weight:600;}
.card-body{padding:1rem;}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* Buttons */
.btn{height:36px;padding:0 14px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{opacity:0.9;}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-green:hover{opacity:0.9;}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-border);}
.btn-red:hover{background:#fee2e2;}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}
.btn-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}

/* Form */
.form-group{margin-bottom:0.85rem;}
.form-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.05em;}
.form-input{width:100%;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);background:#fff;}
textarea.form-input{height:auto;padding:10px;resize:vertical;line-height:1.5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Apartment grid */
.apt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.apt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer;transition:all 0.15s;}
.apt-card:hover{border-color:var(--accent-border);box-shadow:0 2px 10px rgba(61,107,90,0.08);}
.apt-code{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);margin-bottom:4px;}
.apt-name{font-size:12px;color:var(--muted);}
.apt-status{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.04em;}
.pill-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.pill-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.pill-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}

/* Guest list */
.guest-row{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;border-bottom:1px solid var(--border);transition:background 0.1s;}
.guest-row:last-child{border-bottom:none;}
.guest-row:hover{background:var(--bg);}
.guest-apt{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;min-width:50px;}
.guest-name{flex:1;font-size:13px;font-weight:500;}
.guest-meta{font-size:11px;color:var(--muted);}
.guest-actions{display:flex;gap:6px;}
.unlock-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;}
.unlocked{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.locked{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.waiting{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;transition:opacity 0.25s;pointer-events:none;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(520px,100vw);background:var(--surface);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drawer-title{font-size:16px;font-weight:600;}
.drawer-close{width:30px;height:30px;border:none;background:var(--surface2);border-radius:var(--rsm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.drawer-body{flex:1;overflow-y:auto;padding:1.25rem;}
.drawer-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}

/* Photo preview */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.photo-thumb{aspect-ratio:1;border-radius:var(--rsm);object-fit:cover;border:1px solid var(--border);}
.photo-add{aspect-ratio:1;border-radius:var(--rsm);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--hint);font-size:24px;transition:all 0.15s;}
.photo-add:hover{border-color:var(--accent);color:var(--accent);}

/* Guest photo */
.passport-img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--border);margin-top:6px;}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr;}
  .apt-grid{grid-template-columns:1fr 1fr;}
  .main{padding:1rem;}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;">Maxela <span style="color:var(--accent);">Admin</span></div>
  <div class="spinner"></div>
</div>
<div class="toast" id="toast"></div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">Edit Apartment</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

<header>
  <div class="logo">Maxela <span>Check-in</span></div>
  <div class="admin-badge">Admin Panel</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('apartments')">Apartments</button>
  <button class="tab" onclick="switchTab('guests')">Guests</button>
</div>

<div class="main" id="main"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getFirestore,collection,doc,setDoc,updateDoc,deleteDoc,onSnapshot,serverTimestamp,getDoc}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
// Cloudinary
const CLOUD='dlkjizhya';
const PRESET='maxela_uploads';
async function uploadToCloudinary(file,folder='maxela'){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',PRESET);
  fd.append('folder',folder);
  const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD+'/auto/upload',{method:'POST',body:fd});
  const d=await res.json();
  if(d.secure_url)return d.secure_url;
  throw new Error(d.error?.message||'Upload failed');
}

const fb=initializeApp({
  apiKey:"AIzaSyCbggwwtdw751yQUO6MaHCuYKyNn7AyOTk",
  authDomain:"sleepy-5c962.firebaseapp.com",
  projectId:"sleepy-5c962",
  storageBucket:"sleepy-5c962.firebasestorage.app",
  messagingSenderId:"152940098906",
  appId:"1:152940098906:web:bf245230d705c0a62c2f63"
});
const db=getFirestore(fb);


// ── APARTMENT DEFINITIONS ──────────────────────────
const APARTMENTS=[
  // Shartava — 0- rooms
  {id:'0-1',code:'0-1',name:'Small Room 1',group:'Shartava — 0- Rooms',rulesType:'small'},
  {id:'0-2',code:'0-2',name:'Small Room 2',group:'Shartava — 0- Rooms',rulesType:'small'},
  {id:'0-3',code:'0-3',name:'Small Room 3',group:'Shartava — 0- Rooms',rulesType:'small'},
  {id:'0-4',code:'0-4',name:'Small Room 4',group:'Shartava — 0- Rooms',rulesType:'small'},
  {id:'0-5',code:'0-5',name:'Small Room 5',group:'Shartava — 0- Rooms',rulesType:'small'},
  // Shartava — 6- apts
  {id:'6-1',code:'6-1',name:'Apartment 6-1',group:'Shartava — 6- Apartments',rulesType:'apartment'},
  {id:'6-2',code:'6-2',name:'Apartment 6-2',group:'Shartava — 6- Apartments',rulesType:'apartment'},
  {id:'6-3',code:'6-3',name:'Apartment 6-3',group:'Shartava — 6- Apartments',rulesType:'apartment'},
  {id:'6-4',code:'6-4',name:'Apartment 6-4',group:'Shartava — 6- Apartments',rulesType:'apartment'},
  // Shartava — 7- apts
  {id:'7-1',code:'7-1',name:'Apartment 7-1',group:'Shartava — 7- Apartments',rulesType:'apartment'},
  {id:'7-2',code:'7-2',name:'Apartment 7-2',group:'Shartava — 7- Apartments',rulesType:'apartment'},
  {id:'7-4',code:'7-4',name:'Apartment 7-4',group:'Shartava — 7- Apartments',rulesType:'apartment'},
  // Centre — Orb
  {id:'orb-1',code:'Orb 1',name:'Orb Building, Unit 1',group:'City Centre — Orb',rulesType:'apartment'},
  {id:'orb-2',code:'Orb 2',name:'Orb Building, Unit 2',group:'City Centre — Orb',rulesType:'apartment'},
  {id:'orb-3',code:'Orb 3',name:'Orb Building, Unit 3',group:'City Centre — Orb',rulesType:'apartment'},
  // Centre — Tab
  {id:'tab-1',code:'Tab 1',name:'Tab Building, Unit 1',group:'City Centre — Tab',rulesType:'apartment'},
  {id:'tab-2',code:'Tab 2',name:'Tab Building, Unit 2',group:'City Centre — Tab',rulesType:'apartment'},
  {id:'tab-3',code:'Tab 3',name:'Tab Building, Unit 3',group:'City Centre — Tab',rulesType:'apartment'},
];

let aptData={}; // Firebase data per apartment
let guestData=[]; // All guest registrations
let currentTab='apartments';
let currentDrawerApt=null;

// ── HELPERS ───────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
window.closeDrawer=function(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── TAB SWITCHING ─────────────────────────────────
window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===tab));
  render();
}

// ── RENDER ────────────────────────────────────────
function render(){
  if(currentTab==='apartments') renderApartments();
  else renderGuests();
}

function renderApartments(){
  const groups={};
  APARTMENTS.forEach(a=>{
    if(!groups[a.group])groups[a.group]=[];
    groups[a.group].push(a);
  });

  let html='<div class="page">';
  Object.entries(groups).forEach(([grp,apts])=>{
    html+=`<div class="section-title" style="margin-top:1.5rem;">${grp}</div>
    <div class="apt-grid">`;
    apts.forEach(a=>{
      const d=aptData[a.id]||{};
      const hasCode=!!d.doorCode;
      const hasInstructions=!!d.instructions;
      const hasPhotos=(d.photos||[]).length>0;
      html+=`<div class="apt-card" onclick="window.openAptDrawer('${a.id}')">
        <div class="apt-code">${esc(a.code)}</div>
        <div class="apt-name">${esc(a.name)}</div>
        <div class="apt-status">
          <span class="status-pill ${hasCode?'pill-ok':'pill-err'}">${hasCode?'Door code ✓':'No code'}</span>
          <span class="status-pill ${hasInstructions?'pill-ok':'pill-warn'}">${hasInstructions?'Instructions ✓':'No instructions'}</span>
          <span class="status-pill ${hasPhotos?'pill-ok':'pill-warn'}">${hasPhotos?(d.photos.length)+' photos':'No photos'}</span>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderGuests(){
  const today=new Date().toISOString().split('T')[0];
  const recent=guestData
    .sort((a,b)=>b.submittedAt?.seconds-a.submittedAt?.seconds)
    .slice(0,50);

  let html='<div class="page">';
  if(!recent.length){
    html+=`<div style="text-align:center;padding:3rem;color:var(--hint);">
      <div style="font-size:32px;margin-bottom:12px;">👤</div>
      <div style="font-size:14px;font-weight:500;color:var(--muted);">No guest registrations yet</div>
    </div>`;
  } else {
    html+=`<div class="card"><div class="card-body" style="padding:0;">`;
    recent.forEach(g=>{
      const apt=APARTMENTS.find(a=>a.id===g.aptId);
      const now=new Date();
      const checkinTime=new Date();
      checkinTime.setHours(14,0,0,0);
      const isUnlocked=g.manualUnlock||now>=checkinTime;
      const statusLabel=g.manualUnlock?'Unlocked':'Waiting 2pm';
      const statusCls=g.manualUnlock?'unlocked':'waiting';
      const submittedAt=g.submittedAt?.toDate?g.submittedAt.toDate():new Date();
      const timeStr=submittedAt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+submittedAt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

      html+=`<div class="guest-row">
        <div class="guest-apt">${esc(apt?.code||g.aptId)}</div>
        <div style="flex:1;min-width:0;">
          <div class="guest-name">${esc(g.name||'—')}</div>
          <div class="guest-meta">${g.guests||1} guest${(g.guests||1)>1?'s':''} · ${timeStr}</div>
        </div>
        <span class="unlock-badge ${statusCls}">${statusLabel}</span>
        <div class="guest-actions">
          ${!g.manualUnlock?`<button class="btn btn-sm btn-green" onclick="window.unlockGuest('${g.id}')">Unlock</button>`:''}
          <button class="btn btn-sm" onclick="window.viewGuest('${g.id}')">View</button>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

// ── APARTMENT DRAWER ──────────────────────────────
window.openAptDrawer=function(aptId){
  const apt=APARTMENTS.find(a=>a.id===aptId);if(!apt)return;
  currentDrawerApt=aptId;
  const d=aptData[aptId]||{};

  document.getElementById('drawer-title').textContent=apt.code+' — '+apt.name;
  document.getElementById('drawer-body').innerHTML=`
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.75rem;">Check-in details</div>

    <div class="form-group">
      <label class="form-label">Door / Smart lock code</label>
      <input type="text" class="form-input" id="apt-doorcode" value="${esc(d.doorCode||'')}" placeholder="e.g. 1234 or #1234*">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">WiFi name</label>
        <input type="text" class="form-input" id="apt-wifi-name" value="${esc(d.wifiName||'')}" placeholder="Network name">
      </div>
      <div class="form-group">
        <label class="form-label">WiFi password</label>
        <input type="text" class="form-input" id="apt-wifi-pass" value="${esc(d.wifiPass||'')}" placeholder="Password">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Check-in instructions</label>
      <textarea class="form-input" id="apt-instructions" rows="5" placeholder="How to get to the apartment, how to use the door, where to find keys, etc.">${esc(d.instructions||'')}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Video</label>
      <input type="url" class="form-input" id="apt-video" value="${esc(d.videoUrl||'')}" placeholder="Paste YouTube link or upload below" style="margin-bottom:6px;">
      <input type="file" id="apt-video-input" accept="video/*" style="display:none;" onchange="window.uploadVideo('${aptId}',this)">
      <button type="button" class="btn btn-sm" onclick="document.getElementById('apt-video-input').click()" style="width:100%;margin-top:4px;">
        📹 Upload video file (plays directly in guest app)
      </button>
      <div style="font-size:11px;color:var(--hint);margin-top:5px;">Upload video here OR paste a YouTube link above. Both play inside the app — guests never leave your page.</div>
    </div>
    <div class="form-group">
      <label class="form-label">House rules <span style="color:var(--hint);font-weight:400;">(type: ${apt.rulesType})</span></label>
      <textarea class="form-input" id="apt-rules" rows="4" placeholder="No smoking, no parties, quiet hours 11pm...">${esc(d.rules||'')}</textarea>
    </div>

    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin:1rem 0 0.5rem;">Photos</div>
    <div style="font-size:12px;color:var(--hint);margin-bottom:8px;">Upload photos of the entrance, door, apartment interior</div>
    <input type="file" id="apt-photo-input" accept="image/*" multiple style="display:none;" onchange="window.uploadPhotos('${aptId}',this)">
    <div class="photo-grid" id="photo-grid">
      ${(d.photos||[]).map((url,i)=>`<div style="position:relative;"><img src="${url}" class="photo-thumb"><button onclick="window.deletePhoto('${aptId}',${i})" style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;">×</button></div>`).join('')}
      <div class="photo-add" onclick="document.getElementById('apt-photo-input').click()">+</div>
    </div>

    <div style="margin-top:1rem;">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Guest page link</div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);padding:8px 12px;border-radius:var(--rs);color:var(--accent);word-break:break-all;">
        ${window.location.origin+window.location.pathname.replace('checkin-admin.html','')}checkin-guest.html?apt=${aptId}
      </div>
      <button class="btn btn-sm" style="margin-top:6px;" onclick="navigator.clipboard.writeText('${window.location.origin+window.location.pathname.replace('checkin-admin.html','')}checkin-guest.html?apt=${aptId}').then(()=>toast('Link copied!'))">Copy link</button>
    </div>`;

  document.getElementById('drawer-footer').innerHTML=`
    <button class="btn" onclick="closeDrawer()">Cancel</button>
    <button class="btn btn-primary" onclick="window.saveAptData('${aptId}')">Save</button>`;

  openDrawer();
}

window.deletePhoto=async function(aptId,idx){
  if(!confirm('Delete this photo?'))return;
  const photos=(aptData[aptId]?.photos||[]).filter((_,i)=>i!==idx);
  await setDoc(doc(db,'checkin_apartments',aptId),{photos},{merge:true});
  aptData[aptId]={...aptData[aptId],photos};
  toast('Photo deleted');
  window.openAptDrawer(aptId);
}

window.saveAptData=async function(aptId){
  const data={
    doorCode:document.getElementById('apt-doorcode')?.value.trim()||'',
    wifiName:document.getElementById('apt-wifi-name')?.value.trim()||'',
    wifiPass:document.getElementById('apt-wifi-pass')?.value.trim()||'',
    instructions:document.getElementById('apt-instructions')?.value.trim()||'',
    videoUrl:document.getElementById('apt-video')?.value.trim()||'',
    rules:document.getElementById('apt-rules')?.value.trim()||'',
    photos:aptData[aptId]?.photos||[],
    updatedAt:serverTimestamp()
  };
  try{
    await setDoc(doc(db,'checkin_apartments',aptId),data);
    aptData[aptId]={...aptData[aptId],...data};
    toast('Saved ✓');
    closeDrawer();
    render();
  }catch(e){toast('Failed to save');}
}

window.uploadPhotos=async function(aptId,input){
  const files=Array.from(input.files);
  if(!files.length)return;
  toast('Uploading photos...',5000);
  try{
    const urls=[];
    for(const file of files){
      const storageRef=ref(storage,`checkin/${aptId}/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef,file);
      const url=await getDownloadURL(storageRef);
      urls.push(url);
    }
    const existing=aptData[aptId]?.photos||[];
    const allPhotos=[...existing,...urls];
    await setDoc(doc(db,'checkin_apartments',aptId),{photos:allPhotos},{merge:true});
    aptData[aptId]={...aptData[aptId],photos:allPhotos};

    // Update photo grid
    const grid=document.getElementById('photo-grid');
    if(grid){
      grid.innerHTML=allPhotos.map(url=>`<img src="${url}" class="photo-thumb">`).join('')+
        '<div class="photo-add" onclick="document.getElementById(\'apt-photo-input\').click()">+</div>';
    }
    toast('Photos uploaded ✓');
  }catch(e){toast('Upload failed — check Firebase Storage rules');}
}

// ── GUEST MANAGEMENT ─────────────────────────────
window.unlockGuest=async function(guestId){
  if(!confirm('Unlock check-in for this guest now?'))return;
  try{
    await updateDoc(doc(db,'checkin_guests',guestId),{manualUnlock:true,unlockedAt:serverTimestamp()});
    toast('Guest unlocked ✓');
  }catch(e){toast('Failed');}
}

window.viewGuest=function(guestId){
  const g=guestData.find(x=>x.id===guestId);if(!g)return;
  const apt=APARTMENTS.find(a=>a.id===g.aptId);
  document.getElementById('drawer-title').textContent='Guest — '+(apt?.code||g.aptId);
  document.getElementById('drawer-body').innerHTML=`
    <div class="form-group">
      <div class="form-label">Full name</div>
      <div style="font-size:15px;font-weight:600;">${esc(g.name||'—')}</div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Guests</div><div style="font-weight:600;">${g.guests||1}</div></div>
      <div class="form-group"><div class="form-label">Status</div>
        <span class="unlock-badge ${g.manualUnlock?'unlocked':'waiting'}">${g.manualUnlock?'Unlocked':'Waiting 2pm'}</span>
      </div>
    </div>
    ${g.passportUrl?`<div class="form-group"><div class="form-label">Passport photo</div><img src="${g.passportUrl}" class="passport-img"></div>`:'<div style="color:var(--hint);font-size:13px;">No passport photo uploaded</div>'}
    ${!g.manualUnlock?`<button class="btn btn-green" style="width:100%;margin-top:1rem;" onclick="window.unlockGuest('${guestId}');closeDrawer()">Unlock check-in now</button>`:''}`;
  document.getElementById('drawer-footer').innerHTML=`<button class="btn" onclick="closeDrawer()">Close</button>`;
  openDrawer();
}

// ── FIREBASE LISTENERS ────────────────────────────
let loaded=0;
function checkLoaded(){loaded++;if(loaded>=2){document.getElementById('loading').style.display='none';render();}}

onSnapshot(collection(db,'checkin_apartments'),snap=>{
  aptData={};
  snap.docs.forEach(d=>{aptData[d.id]=d.data();});
  if(loaded>=2)render();else checkLoaded();
});

onSnapshot(collection(db,'checkin_guests'),snap=>{
  guestData=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(loaded>=2)render();else checkLoaded();
});

setTimeout(()=>{document.getElementById('loading').style.display='none';render();},5000);
</script>
</body>
</html>
