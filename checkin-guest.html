<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maxela Apartments</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f5;--surface:#fff;--surface2:#f2efe9;
  --border:#e8e2d9;--text:#1a1714;--muted:#7a7268;--hint:#b8b0a6;
  --gold:#a07840;--gold-light:#f5edd8;--gold-border:#dfc898;
  --green:#2d6b50;--green-bg:#edf5f0;--green-border:#8ecdb0;
  --red:#8b2020;--red-bg:#fdf0f0;
  --blue:#1a4a7a;--blue-bg:#eef3fa;
  --r:16px;--rs:10px;--rsm:6px;
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100%;overflow-x:hidden;padding-bottom:3rem;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
.loading-brand{font-family:'Fraunces',serif;font-size:28px;font-weight:400;letter-spacing:0.04em;}
.loading-brand span{color:var(--gold);}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;font-weight:500;}
.toast.show{opacity:1;}

.lang-bar{display:flex;justify-content:center;gap:5px;padding:10px 0 8px;background:var(--surface);border-bottom:1px solid var(--border);}
.lang-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.lang-btn.active{background:var(--text);color:#fff;border-color:var(--text);}

.page{display:none;animation:fadeIn 0.2s ease;}
.page.active{display:block;}
.subpage{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;animation:slideIn 0.25s cubic-bezier(0.4,0,0.2,1);}
.subpage-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:20px;flex-shrink:0;}
.subpage-title{font-family:'Fraunces',serif;font-size:18px;font-weight:400;letter-spacing:0.02em;}
.subpage-body{padding:1.25rem;}

.hero{background:linear-gradient(135deg,#1a1714 0%,#3a2e28 100%);padding:2rem 1.25rem 1.75rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.hero *{position:relative;}
.hero-brand{font-family:'Fraunces',serif;font-size:24px;font-weight:400;color:#fff;letter-spacing:0.05em;}
.hero-brand span{color:var(--gold-border);}
.hero-tagline{font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:0.04em;margin-top:2px;}
.hero-greeting{font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:5px;}
.hero-name{font-family:'Fraunces',serif;font-size:24px;font-weight:400;color:#fff;margin-bottom:2px;}
.hero-apt{font-size:13px;color:var(--gold-border);font-weight:500;}

.form-wrap{padding:1.25rem;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.form-card-title{font-family:'Fraunces',serif;font-size:16px;font-weight:400;margin-bottom:1rem;letter-spacing:0.02em;}
.form-group{margin-bottom:0.85rem;}
.form-group:last-child{margin-bottom:0;}
.form-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.06em;}
.form-input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--gold);background:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.ct-wrap{display:flex;gap:8px;margin-bottom:10px;}
.ct-btn{flex:1;height:44px;border:1.5px solid var(--border);border-radius:var(--rs);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;}
.ct-btn.wa-active{background:#e8f8ef;border-color:#25D366;color:#1a7a3c;}
.ct-btn.tg-active{background:#e8f4fc;border-color:#229ED9;color:#1a5e8a;}

.passport-zone{border:2px dashed var(--border);border-radius:var(--rs);padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--bg);}
.passport-zone:hover{border-color:var(--gold);background:var(--gold-light);}
.passport-zone.has-photo{border-style:solid;border-color:var(--green-border);background:var(--green-bg);}
.pz-icon{font-size:28px;margin-bottom:6px;}
.pz-text{font-size:13px;color:var(--muted);line-height:1.5;}
#passport-preview{width:100%;max-height:180px;object-fit:cover;border-radius:var(--rsm);margin-top:10px;display:none;}

.submit-btn{width:100%;height:52px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.submit-btn:hover{opacity:0.88;}
.submit-btn:disabled{opacity:0.45;cursor:not-allowed;}

.home-body{padding:1.25rem;}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1rem 1rem;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.tile:active{transform:scale(0.98);}
.tile.locked{opacity:0.6;cursor:default;}
.tile.locked:hover{transform:none;box-shadow:none;border-color:var(--border);}
.tile:not(.locked):hover{border-color:var(--gold-border);box-shadow:0 4px 18px rgba(160,120,64,0.1);transform:translateY(-1px);}
.tile-lock{position:absolute;top:10px;right:10px;font-size:12px;}
.tile-icon{font-size:28px;margin-bottom:8px;display:block;}
.tile-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3;}
.tile-sub{font-size:11px;color:var(--hint);line-height:1.4;}
.tile-full{grid-column:1/-1;}
.tile-gold{background:linear-gradient(135deg,var(--gold-light) 0%,#fff 100%);border-color:var(--gold-border);}

.locked-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem 1.5rem;text-align:center;margin-bottom:1rem;}
.lc-icon{font-size:38px;margin-bottom:12px;}
.lc-title{font-family:'Fraunces',serif;font-size:18px;font-weight:400;margin-bottom:8px;}
.lc-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.countdown{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;color:var(--text);letter-spacing:0.05em;}

.section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:400;margin-bottom:0.75rem;letter-spacing:0.01em;margin-top:1rem;}
.section-title:first-child{margin-top:0;}
.code-box{background:var(--text);border-radius:var(--rs);padding:1.25rem;text-align:center;margin-bottom:1rem;}
.code-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.code-val{font-family:'DM Mono',monospace;font-size:38px;font-weight:500;color:#fff;letter-spacing:0.15em;}
.code-copy{margin-top:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;padding:5px 16px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;}

.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px;}
.info-row:last-child{border-bottom:none;}
.ir-lbl{font-size:13px;color:var(--muted);font-weight:500;}
.ir-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.ir-copy{background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:4px 10px;font-size:11px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;}

.instr-text{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;margin-bottom:1rem;}
.rules-box{background:var(--gold-light);border:1px solid var(--gold-border);border-radius:var(--rs);padding:1rem 1.1rem;margin-bottom:1rem;}
.rules-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--gold);margin-bottom:6px;}
.rules-text{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;}
.photos-scroll{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;max-width:480px;}
.photos-scroll img{width:100%;border-radius:var(--rs);object-fit:cover;cursor:pointer;max-height:300px;}
.video-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:1rem;aspect-ratio:16/9;background:var(--surface2);}
.video-wrap iframe{width:100%;height:100%;border:none;}

.service-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s;}
.service-card:hover{border-color:var(--gold-border);background:var(--gold-light);}
.sc-icon{width:48px;height:48px;border-radius:var(--rs);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.sc-info{flex:1;min-width:0;}
.sc-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.sc-desc{font-size:12px;color:var(--muted);line-height:1.4;}
.sc-price{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--gold);white-space:nowrap;}
.sc-arrow{color:var(--hint);font-size:20px;flex-shrink:0;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:560px;padding:1.5rem 1.25rem 2.5rem;animation:fadeUp 0.25s ease;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:400;margin-bottom:1rem;}
textarea.form-input{height:90px;padding:12px 14px;resize:none;line-height:1.5;}
.modal-submit{width:100%;height:50px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:0.75rem;}
.modal-cancel{width:100%;height:44px;background:transparent;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin-top:8px;}

.req-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:8px;}
.req-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.req-note{font-size:12px;color:var(--muted);}
.req-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;margin-top:6px;}
.req-pending{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-border);}
.req-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}

.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:10px;}
.rec-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--gold);margin-bottom:4px;}
.rec-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.rec-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.rec-map{font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-bg);border:1px solid #c8d8f0;padding:4px 12px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}

.contact-btn{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;text-decoration:none;color:var(--text);margin-bottom:10px;cursor:pointer;transition:all 0.15s;width:100%;}
.contact-btn:hover{border-color:var(--gold-border);}
.cb-icon{width:48px;height:48px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:#e8f8ef;}
.cb-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.cb-sub{font-size:12px;color:var(--muted);}


/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;}
.lightbox.hidden{display:none;}
.lb-img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:var(--rs);user-select:none;}
.lb-close{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100000;}
.lb-close:hover{background:rgba(255,255,255,0.25);}
.lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1000;transition:background 0.15s;}
.lb-prev{left:12px;}
.lb-next{right:12px;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,0.3);}
.lb-counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:13px;font-family:'DM Mono',monospace;z-index:100000;}
.lb-prev.hidden,.lb-next.hidden{display:none;}
@media(max-width:360px){.tiles-grid{grid-template-columns:1fr;}.tile-full{grid-column:1;}}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-brand">Maxela <span>Apartments</span></div>
  <div class="spinner"></div>
</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay hidden" id="svc-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="svc-modal-title">Request</div>
    <div id="svc-modal-extra"></div>
    <div class="form-group">
      <label class="form-label" id="svc-note-lbl">Notes</label>
      <textarea class="form-input" id="svc-note" placeholder="..."></textarea>
    </div>
    <button class="modal-submit" onclick="window.submitService()">Send request</button>
    <button class="modal-cancel" onclick="window.closeServiceModal()">Cancel</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ka')">ქარ</button>
    <button class="lang-btn" onclick="setLang('ru')">РУС</button>
    <button class="lang-btn" onclick="setLang('ar')">عربي</button>
  </div>

  <!-- REGISTER PAGE -->
  <div class="page active" id="page-register">
    <div class="hero">
      <div class="hero-brand">Maxela <span>Apartments</span></div>
      <div class="hero-tagline" id="t-welcome-sub">Welcome — please complete your check-in</div>
    </div>
    <div class="form-wrap">
      <div class="form-card">
        <div class="form-card-title" id="t-your-info">Your information</div>
        <div class="form-group">
          <label class="form-label" id="t-full-name">Full name</label>
          <input type="text" class="form-input" id="r-name" placeholder="As on your passport" autocomplete="name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" id="t-guests">Guests</label>
            <input type="number" class="form-input" id="r-guests" value="1" min="1" max="20">
          </div>
          <div class="form-group">
            <label class="form-label" id="t-nationality">Nationality</label>
            <input type="text" class="form-input" id="r-nationality" placeholder="e.g. Georgian">
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title" id="t-contact-title">Contact</div>
        <div class="ct-wrap">
          <button class="ct-btn wa-active" id="ct-wa" onclick="setContact('wa')">WhatsApp</button>
          <button class="ct-btn" id="ct-tg" onclick="setContact('tg')">Telegram</button>
        </div>
        <div class="form-group">
          <label class="form-label" id="t-contact-num">Your number / username <span style="color:var(--red);">*</span></label>
          <input type="tel" class="form-input" id="r-contact" placeholder="+995...">
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title" id="t-passport-title">Passport / ID photo</div>
        <div class="passport-zone" id="passport-zone" onclick="document.getElementById('passport-input').click()">
          <div class="pz-icon">📷</div>
          <div class="pz-text" id="t-passport-hint">Tap to take a photo or upload from gallery</div>
          <img id="passport-preview">
        </div>
        <input type="file" id="passport-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePassport(this)">
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitRegistration()">
        <span id="t-submit-btn">Complete registration</span>
      </button>
    </div>
  </div>

  <!-- HOME PAGE -->
  <div class="page" id="page-home">
    <div class="hero">
      <div class="hero-greeting" id="t-greeting-label">Welcome</div>
      <div class="hero-name" id="home-guest-name">Guest</div>
      <div class="hero-apt" id="home-apt-name">Apartment</div>
    </div>
    <div class="home-body">
      <div class="tiles-grid" id="tiles-grid"></div>
    </div>
  </div>
</div>

<div id="subpages"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,collection,addDoc,onSnapshot,serverTimestamp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
// Cloudinary for uploads
const CLOUD='dlkjizhya';
const PRESET='maxela_uploads';
async function uploadToCloudinary(file,folder){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',PRESET);
  fd.append('folder',folder);
  const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD+'/auto/upload',{method:'POST',body:fd});
  const d=await res.json();
  if(d.secure_url)return d.secure_url;
  throw new Error(d.error?.message||'Upload failed');
}

const fb=initializeApp({
  apiKey:"AIzaSyCbggwwtdw751yQUO6MaHCuYKyNn7AyOTk",
  authDomain:"sleepy-5c962.firebaseapp.com",
  projectId:"sleepy-5c962",
  storageBucket:"sleepy-5c962.firebasestorage.app",
  messagingSenderId:"152940098906",
  appId:"1:152940098906:web:bf245230d705c0a62c2f63"
});
const db=getFirestore(fb);


const WA='995593000724';

const params=new URLSearchParams(window.location.search);
const aptId=params.get('apt')||'';

const APT_NAMES={
  '0-1':'Room 0-1','0-2':'Room 0-2','0-3':'Room 0-3','0-4':'Room 0-4','0-5':'Room 0-5',

function t(k){return T[lang]?.[k]||T.en?.[k]||k;}
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function isUnlocked(){
  if(!guestData)return false;
  if(guestData.manualUnlock)return true;
  const now=new Date();
  const tb=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Tbilisi'}));
  return tb.getHours()>=14;
}

function timeUntil2pm(){
  const now=new Date();
  const tb=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Tbilisi'}));
  const target=new Date(tb);target.setHours(14,0,0,0);
  return Math.max(0,target-tb);
}

function fmtCD(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function isCloudinaryVideo(url){
  return url&&url.includes('cloudinary.com')&&(url.includes('/video/')||url.match(/\.(mp4|mov|webm|avi)/i));
}

function ytEmbed(url){
  if(!url)return null;
  // Cloudinary video — play directly
  if(isCloudinaryVideo(url))return url;
  // YouTube
  const yt=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt)return`https://www.youtube.com/embed/${yt[1]}`;
  return null;
}

window.setLang=function(l){
  lang=l;
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'")));
  applyTranslations();
  if(document.getElementById('page-home').classList.contains('active'))renderTiles();
}

window.handlePassport=function(input){
  const file=input.files[0];if(!file)return;
  passportFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const p=document.getElementById('passport-preview');
    p.src=e.target.result;p.style.display='block';
    document.getElementById('passport-zone').classList.add('has-photo');
    document.getElementById('t-passport-hint').textContent='Photo selected ✓';
  };
  reader.readAsDataURL(file);
}

window.submitRegistration=async function(){
  const name=document.getElementById('r-name')?.value.trim();
  const guests=parseInt(document.getElementById('r-guests')?.value)||1;
  const nationality=document.getElementById('r-nationality')?.value.trim()||'';
  const contact=document.getElementById('r-contact')?.value.trim()||'';
  if(!name){alert('Please enter your full name');return;}
  if(!contact){alert('Please enter your WhatsApp or Telegram number');return;}
  if(!passportFile){alert('Please upload your passport or ID photo');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  document.getElementById('t-submit-btn').textContent='Uploading...';
  try{
    const passportUrl=await uploadToCloudinary(passportFile,'maxela/guests/'+aptId);
    guestId=`${aptId}_${Date.now()}`;
    const data={aptId,name,guests,nationality,contact,contactType,passportUrl,manualUnlock:false,submittedAt:serverTimestamp()};
    await setDoc(doc(db,'checkin_guests',guestId),data);
    guestData={...data,id:guestId};
    localStorage.setItem('maxela_g_'+aptId,guestId);
    toast(t('rg'),3000);
    showHome();
  }catch(e){
    btn.disabled=false;
    document.getElementById('t-submit-btn').textContent=t('sb');
    alert('Failed. Please check your connection and try again.');
  }
}

function showHome(){
  document.getElementById('page-register').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('home-guest-name').textContent=guestData?.name||'Guest';
  document.getElementById('home-apt-name').textContent=APT_NAMES[aptId]||aptId;
  document.getElementById('t-greeting-label').textContent=t('gl');
  renderTiles();
  if(guestId){
    onSnapshot(doc(db,'checkin_guests',guestId),snap=>{
      if(snap.exists()){guestData={...snap.data(),id:guestId};renderTiles();}
    });
    onSnapshot(collection(db,'checkin_requests'),snap=>{
      myRequests=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.guestId===guestId);
    });
  }
}

function openLocked(){
  const rem=timeUntil2pm();
  openSubpage(t('tc'),`<div class="locked-card">
    <div class="lc-icon">🔒</div>
    <div class="lc-title">${t('lt')}</div>
    <div class="lc-sub">${t('ls')}</div>
    <div style="font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">${t('cl')}</div>
    <div class="countdown" id="cd">${fmtCD(rem)}</div>
  </div>`);
  if(cdInterval)clearInterval(cdInterval);
  cdInterval=setInterval(()=>{
    const el=document.getElementById('cd');if(!el){clearInterval(cdInterval);return;}
    const r=timeUntil2pm();el.textContent=fmtCD(r);
    if(r<=0||isUnlocked()){clearInterval(cdInterval);closeSP();window.openPage('checkin');}
  },1000);
}

function openSubpage(title,body){
  const sp=document.createElement('div');sp.className='subpage';sp.id='cur-sp';
  sp.innerHTML=`<div class="subpage-header"><button class="back-btn" onclick="closeSP()">←</button><div class="subpage-title">${esc(title)}</div></div><div class="subpage-body">${body}</div>`;
  document.getElementById('subpages').appendChild(sp);
}

window.closeSP=function(){
  const sp=document.getElementById('cur-sp');
  if(sp){sp.style.transition='transform 0.2s,opacity 0.2s';sp.style.transform='translateX(100%)';sp.style.opacity='0';setTimeout(()=>sp.remove(),210);}
  if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
}

window.copySth=function(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;btn.textContent=t('cpd');
    setTimeout(()=>{btn.textContent=orig;},1500);
  });
}

window.openSvc=function(id,name,hasTime){
  currentSvcId=id;currentSvcName=name;
  const modal=document.getElementById('svc-modal');
  document.getElementById('svc-modal-title').textContent=name;
  document.getElementById('svc-note-lbl').textContent=t('sn');
  document.getElementById('svc-note').placeholder=t('snh');
  document.getElementById('svc-note').value='';

  // Add time picker if needed
  let timePicker=document.getElementById('svc-time-wrap');
  if(timePicker)timePicker.remove();
  if(hasTime==='yes'){
    const wrap=document.createElement('div');
    wrap.id='svc-time-wrap';
    wrap.style='margin-bottom:0.85rem;';
    wrap.innerHTML=`<label style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.06em;">Preferred time (10:00–19:00)</label>
    <select id="svc-time" style="width:100%;height:46px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;">
      <option value="">Select a time...</option>
      ${['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'].map(h=>`<option value="${h}">${h}</option>`).join('')}
    </select>
    <div style="font-size:11px;color:var(--hint);margin-top:5px;line-height:1.5;">Request must be accepted first. Apartment must be empty during service. Staff will confirm availability.</div>`;
    const noteGroup=modal.querySelector('.form-group');
    modal.querySelector('.modal-sheet').insertBefore(wrap, noteGroup);
  }
  modal.classList.remove('hidden');
}
window.closeServiceModal=function(){document.getElementById('svc-modal').classList.add('hidden');}
window.submitService=async function(){
  if(!currentSvcId||!guestId)return;
  const note=document.getElementById('svc-note')?.value.trim()||'';
  const preferredTime=document.getElementById('svc-time')?.value||'';
  const aptName=APT_NAMES[aptId]||aptId;
  try{
    await addDoc(collection(db,'checkin_requests'),{
      guestId,aptId,serviceId:currentSvcId,serviceName:currentSvcName,
      note,preferredTime,done:false,createdAt:serverTimestamp()
    });
    window.closeServiceModal();
    toast(t('rs'));
    // Open WhatsApp with notification
    const waMsg=encodeURIComponent(
      `New service request from ${aptName}:\n`+
      `Guest: ${guestData?.name||'Guest'}\n`+
      `Service: ${currentSvcName}\n`+
      (preferredTime?`Time: ${preferredTime}\n`:'')+
      (note?`Notes: ${note}\n`:'')+
      `Contact: ${guestData?.contact||'—'}`
    );
    setTimeout(()=>window.open('https://wa.me/'+WA+'?text='+waMsg,'_blank'),500);
  }catch(e){toast(t('rf'));}
}


// ── LIGHTBOX ──────────────────────────────────────
let lbPhotos=[];
let lbIndex=0;

window.openLightbox=function(photos,index){
  if(!photos||!photos.length)return;
  lbPhotos=Array.isArray(photos)?photos:[photos];
  lbIndex=index||0;
  updateLightbox();
  const lb=document.getElementById('lightbox');
  if(lb){lb.classList.remove('hidden');lb.style.display='flex';}
  document.body.style.overflow='hidden';
}

window.closeLightbox=function(){
  const lb=document.getElementById('lightbox');
  if(lb){lb.classList.add('hidden');lb.style.display='none';}
  document.body.style.overflow='';
}

window.lbMove=function(dir){
  lbIndex=Math.max(0,Math.min(lbPhotos.length-1,lbIndex+dir));
  updateLightbox();
}

function updateLightbox(){
  const img=document.getElementById('lb-img');
  const counter=document.getElementById('lb-counter');
  const prev=document.getElementById('lb-prev');
  const next=document.getElementById('lb-next');
  if(img)img.src=lbPhotos[lbIndex];
  if(counter)counter.textContent=(lbIndex+1)+' / '+lbPhotos.length;
  if(prev)prev.classList.toggle('hidden',lbIndex===0);
  if(next)next.classList.toggle('hidden',lbIndex===lbPhotos.length-1);
}

// Swipe support for lightbox
let lbTouchX=0;
document.addEventListener('touchstart',e=>{if(!document.getElementById('lightbox').classList.contains('hidden'))lbTouchX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  if(document.getElementById('lightbox').classList.contains('hidden'))return;
  const diff=lbTouchX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50)window.lbMove(diff>0?1:-1);
});

// Keyboard support
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('hidden'))return;
  if(e.key==='ArrowLeft')window.lbMove(-1);
  if(e.key==='ArrowRight')window.lbMove(1);
  if(e.key==='Escape')window.closeLightbox();
});

async function init(){
  if(!aptId){
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('page-register').innerHTML=`<div style="text-align:center;padding:4rem 2rem;"><div style="font-size:40px;margin-bottom:16px;">⚠️</div><div style="font-family:'Fraunces',serif;font-size:20px;margin-bottom:8px;">Invalid link</div><div style="font-size:14px;color:var(--muted);">Please use the link provided by Maxela Apartments.</div></div>`;
    return;
  }
  try{const snap=await getDoc(doc(db,'checkin_apartments',aptId));if(snap.exists())aptData=snap.data();}catch(e){}
  const saved=localStorage.getItem('maxela_g_'+aptId);
  if(saved){
    try{
      const snap=await getDoc(doc(db,'checkin_guests',saved));
      if(snap.exists()){guestId=saved;guestData={...snap.data(),id:saved};}
    }catch(e){}
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  if(guestData)showHome();
}

init();
</script>

<div class="lightbox hidden" id="lightbox" onclick="if(event.target===this)window.closeLightbox()">
  <button class="lb-close" onclick="window.closeLightbox()">×</button>
  <button class="lb-prev" id="lb-prev" onclick="window.lbMove(-1)">‹</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-next" id="lb-next" onclick="window.lbMove(1)">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>
