name: Maxela Pricing Engine

on:
  workflow_dispatch:

jobs:
  pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin anthropic

      - name: Run pricing engine
        env:
          MINIHOTEL_HOTEL:          ${{ secrets.MINIHOTEL_HOTEL }}
          MINIHOTEL_USER:           ${{ secrets.MINIHOTEL_USER }}
          MINIHOTEL_PASS:           ${{ secrets.MINIHOTEL_PASS }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SERPAPI_KEY:              ${{ secrets.SERPAPI_KEY }}
          SENDGRID_KEY:             ${{ secrets.SENDGRID_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pricing_engine.py --apply
