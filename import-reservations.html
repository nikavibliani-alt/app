function log(msg,cls=''){
  const el=document.getElementById('log');
  if(cls) el.insertAdjacentHTML('beforeend',`<span class="${cls}">${msg}</span>\n`);
  else el.textContent+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}
function setStatus(msg,color){
  const b=document.getElementById('statusBadge');
  b.textContent=msg;b.style.background=color||'#eff6ff';b.style.color=color?'#fff':'#1d4ed8';
}

window.doImport=async function(){
  if(!confirm(`⚠️ This will permanently DELETE all existing reservations and import ${IMPORT_DATA.length} new ones.\n\nAre you sure?`))return;
  const btn=document.getElementById('importBtn');
  btn.disabled=true;
  document.getElementById('log').textContent='';
  setStatus('Working…','#f59e0b');

  try{
    // Step 1: Delete all existing reservations
    log('Step 1 — Fetching existing reservations…','info');
    const snap=await getDocs(collection(db,'reservations'));
    log(`  Found ${snap.docs.length} existing document(s) to delete.`);
    if(snap.docs.length>0){
      await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'reservations',d.id))));
      log(`  ✓ Deleted ${snap.docs.length} reservations.`,'good');
    } else {
      log('  Collection was already empty.','info');
    }

    // Step 2: Import all new reservations
    log('\nStep 2 — Importing '+IMPORT_DATA.length+' reservations…','info');
    const ts=serverTimestamp();
    let count=0;
    for(const r of IMPORT_DATA){
      await addDoc(collection(db,'reservations'),{...r,createdAt:ts,updatedAt:ts});
      count++;
      if(count%10===0||count===IMPORT_DATA.length){
        log(`  Imported ${count}/${IMPORT_DATA.length}…`);
      }
    }

    log('\n✅ Done! '+IMPORT_DATA.length+' reservations imported successfully.','good');
    log('Auto-allocation will run automatically when you open SleepyPMS.html.','info');
    log('\nYou can now close this tab.','info');
    setStatus('Done ✓','#16a34a');
  }catch(e){
    log('\n❌ ERROR: '+e.message,'err');
    setStatus('Error','#dc2626');
    btn.disabled=false;
  }
};
