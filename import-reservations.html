function convDate(s){const[d,m,y]=s.split('.');return `${y}-${m}-${d}`;}
function parseTotal(s){
  const parts=s.trim().split(' ');
  const cur=parts[0];
  const amt=parseFloat(parts.slice(1).join('').replace(/,/g,''));
  return{currency:cur,total:amt};
}

const IMPORT_DATA=[
  // 97 original records with full source + price data
  ...RAW.map(r=>{
    const[guest,rawIn,rawOut,nights,rawSrc,rawRoom,rawTotal]=r;
    const{currency,total}=parseTotal(rawTotal);
    const price=Math.round(total/nights*100)/100;
    const roomCode=RM[rawRoom]||rawRoom.toLowerCase();
    return{guest,checkin:convDate(rawIn),checkout:convDate(rawOut),nights,source:SRC[rawSrc]||rawSrc.toLowerCase(),roomCode,currency,price,totalPriceStr:rawTotal,email:'',adults:2,children:0,guests:2,status:'Channel Manager'};
  }),
  // 23 departure additions — no source/price; defaults applied
  ...RAW_EXTRA.map(r=>{
    const[guest,rawIn,rawOut,rawRoom]=r;
    const cin=new Date(convDate(rawIn)+'T12:00:00');
    const cout=new Date(convDate(rawOut)+'T12:00:00');
    const nights=Math.round((cout-cin)/86400000);
    const roomCode=RM[rawRoom]||rawRoom.toLowerCase();
    return{guest,checkin:convDate(rawIn),checkout:convDate(rawOut),nights,source:'direct',roomCode,currency:'GEL',price:0,totalPriceStr:'',email:'',adults:2,children:0,guests:2,status:'Channel Manager'};
  }),
];

});

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=(cls?`<span class="${cls}">${msg}</span>`:msg)+'\n';
  el.scrollTop=el.scrollHeight;
}
function badge(msg,color){
  const b=document.getElementById('badge');
  b.textContent=msg;
  b.style.background=color||'#eff6ff';
  b.style.color=color?'#fff':'#1d4ed8';
}

window.run=async function(){
  if(!confirm(`Delete ALL existing reservations and import ${IMPORT_DATA.length} new ones?`))return;
  document.getElementById('importBtn').disabled=true;
  document.getElementById('log').textContent='';
  badge('Working…','#f59e0b');

  try{
    log('Step 1 — Fetching existing reservations…','info');
    const snap=await getDocs(collection(db,'reservations'));
    log(`  Found ${snap.docs.length} existing document(s).`);
    if(snap.docs.length>0){
      await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'reservations',d.id))));
      log(`  ✓ Deleted ${snap.docs.length} reservations.`,'ok');
    }else{
      log('  Collection was already empty.','info');
    }

    log(`\nStep 2 — Importing ${IMPORT_DATA.length} reservations…`,'info');
    const ts=serverTimestamp();
    let count=0;
    for(const r of IMPORT_DATA){
      await addDoc(collection(db,'reservations'),{...r,createdAt:ts,updatedAt:ts});
      count++;
      if(count%10===0||count===IMPORT_DATA.length) log(`  Imported ${count}/${IMPORT_DATA.length}…`);
    }

    log(`\nStep 3 — Verifying…`,'info');
    const check=await getDocs(collection(db,'reservations'));
    log(`  Collection now has ${check.docs.length} document(s).`);
    if(check.docs.length===IMPORT_DATA.length){
      log(`\n✅ Done! ${IMPORT_DATA.length} reservations imported and verified.`,'ok');
      log(`  97 with full data + 23 departure additions (4 VGL skipped).`,'info');
      log('Auto-allocation will run when you open SleepyPMS.html.','info');
      badge('Done ✓','#16a34a');
    }else{
      log(`  ⚠ Expected ${IMPORT_DATA.length}, found ${check.docs.length}.`,'err');
      badge('Mismatch','#dc2626');
    }
  }catch(e){
    log('\n❌ ERROR: '+e.message,'err');
    badge('Error','#dc2626');
    document.getElementById('importBtn').disabled=false;
  }
};

window.verify=async function(){
  log('\nVerifying collection…','info');
  try{
    const snap=await getDocs(collection(db,'reservations'));
    if(snap.empty) log('  Collection is EMPTY.','err');
    else log(`  ✓ ${snap.docs.length} reservation(s) in Firebase.`,'ok');
  }catch(e){log('  ERROR: '+e.message,'err');}
};
