<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import from Google Sheets — Sleepy PMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;max-width:1100px;margin:2rem auto;padding:0 1.25rem;color:#1e293b;background:#f8fafc;}
h1{font-size:20px;font-weight:700;margin-bottom:.35rem;}
.sub{font-size:13px;color:#64748b;margin-bottom:1.25rem;}
.btn{padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;border-radius:7px;border:none;transition:opacity .15s;}
.btn:hover{opacity:.87;} .btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-fetch{background:#3b82f6;color:#fff;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-check{background:#16a34a;color:#fff;}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;}
#badge{font-size:13px;font-weight:600;padding:5px 12px;border-radius:5px;background:#eff6ff;color:#1d4ed8;}
.stats-bar{display:flex;gap:20px;flex-wrap:wrap;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.85rem 1.25rem;margin-bottom:1rem;font-size:13px;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-val{font-size:20px;font-weight:700;font-family:monospace;line-height:1;}
.stat-lbl{font-size:10.5px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;}
.stat-green .stat-val{color:#16a34a;} .stat-red .stat-val{color:#dc2626;} .stat-blue .stat-val{color:#2563eb;}
#log{font-family:monospace;font-size:12px;line-height:1.7;background:#0f172a;color:#94a3b8;padding:1rem;border-radius:8px;min-height:40px;max-height:280px;overflow-y:auto;white-space:pre-wrap;margin-bottom:1rem;}
.ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;} .warn{color:#fbbf24;}
table{width:100%;border-collapse:collapse;font-size:11.5px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;}
th,td{text-align:left;padding:5px 9px;border-bottom:1px solid #f1f5f9;}
th{background:#f8fafc;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;position:sticky;top:0;}
tr:last-child td{border-bottom:none;} tr:hover td{background:#fafbfc;}
.pill{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:9px;display:inline-block;white-space:nowrap;}
.pill-booking{background:#eff6ff;color:#1d4ed8;} .pill-airbnb{background:#fdf2f8;color:#be185d;}
.pill-expedia{background:#fffbeb;color:#b45309;} .pill-direct{background:#f0fdf4;color:#15803d;}
.pill-split{background:#fef3c7;color:#92400e;font-size:9px;}
.tbl-wrap{max-height:500px;overflow-y:auto;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:1rem;}
.skip-section{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.85rem 1.25rem;margin-bottom:1rem;}
.skip-section summary{font-size:13px;font-weight:600;cursor:pointer;color:#64748b;}
.skip-row{font-size:12px;font-family:monospace;color:#64748b;padding:2px 0;border-bottom:1px solid #f1f5f9;}
.skip-row:last-child{border-bottom:none;}
.skip-reason{color:#dc2626;margin-left:8px;}
</style>
</head>
<body>
<h1>Sleepy PMS — Live Import from Google Sheets</h1>
<p class="sub">Fetches the live sheet, filters VGL/fake/past entries, splits multi-room bookings, then shows a preview before touching Firebase.</p>

<div class="actions" id="topActions">
  <button class="btn btn-fetch" id="fetchBtn" onclick="fetchAndPreview()">
    Fetch &amp; Preview from Google Sheets
  </button>
  <button class="btn" style="background:#7c3aed;color:#fff;" onclick="diagnose()">
    Diagnose Firebase
  </button>
  <span id="badge">Ready — click Fetch to start</span>
</div>

<div id="log"></div>
<div id="statsBar" style="display:none"></div>
<div id="skipSection" style="display:none"></div>
<div id="previewSection" style="display:none"></div>
<div id="importActions" style="display:none" class="actions"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
import{getFirestore,collection,doc,setDoc,deleteDoc,getDocs,serverTimestamp}from'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

const db=getFirestore(initializeApp({
  apiKey:'AIzaSyCbggwwtdw751yQUO6MaHCuYKyNn7AyOTk',
  authDomain:'sleepy-5c962.firebaseapp.com',
  projectId:'sleepy-5c962',
  storageBucket:'sleepy-5c962.firebasestorage.app',
  messagingSenderId:'152940098906',
  appId:'1:152940098906:web:bf245230d705c0a62c2f63'
}));

const SHEET_URL='https://docs.google.com/spreadsheets/d/14dRKZrCqAmCfLYAI4G4cW7EJuMKzkuxOpIllabsSwbk/export?format=csv';
const CUTOFF_DATE='2026-05-09'; // import if checkout >= this date

const SKIP_WORDS=['VGL','FAKE','ANTS','LAUNDRY','INDOELI','IGIVE','TARAKANA','KARI'];

const RM={
  'M-6-1':'6-1','M-6-2':'6-2','M-6-3':'6-3','M-6-4':'6-4',
  'M-7-1':'7-1','M-7-2':'7-2','M-7-4':'7-4',
  'M-5-1':'5-1','M-5-2':'5-2',
  'T-1':'tab-1','T-2':'tab-2','T-3':'tab-3','T-4':'tab-4',
  'Midamo 1':'orb-1','Midamo 2':'orb-2','Midamo 3':'orb-3',
};
const SRC={'BOOKING':'booking','AIRBNB':'airbnb','EXPEDIA':'expedia'};

let READY_DATA=[];

// ── helpers ──────────────────────────────────────────────────────────────────

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=(cls?`<span class="${cls}">${msg}</span>`:msg)+'\n';
  el.scrollTop=el.scrollHeight;
}
function badge(msg,color){
  const b=document.getElementById('badge');
  b.textContent=msg;
  b.style.background=color||'#eff6ff';
  b.style.color=color?'#fff':'#1d4ed8';
}

// Proper CSV parser — handles quoted fields with embedded newlines and commas
function parseCSV(text){
  const rows=[];
  let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inQ){
      if(c==='"'&&n==='"'){cell+='"';i++;}       // escaped "
      else if(c==='"'){inQ=false;}               // end of quoted field
      else{cell+=c;}
    } else {
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);if(row.some(x=>x.trim()))rows.push(row);row=[];cell='';}
      else if(c!=='\r'){cell+=c;}
    }
  }
  if(cell||row.length)row.push(cell);
  if(row.some(x=>x.trim()))rows.push(row);
  return rows;
}

// DD/MM/YYYY → YYYY-MM-DD
function parseDate(s){
  if(!s)return'';
  const p=s.trim().split('/');
  if(p.length!==3)return s;
  return`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
}

// "GEL 1,053.00" → {currency:'GEL', amount:1053}
function parseMoney(s){
  if(!s||!s.trim())return{currency:'GEL',amount:0};
  const parts=s.trim().split(' ');
  const currency=parts[0];
  const amount=parseFloat(parts.slice(1).join('').replace(/,/g,''))||0;
  return{currency,amount};
}

function shouldSkip(roomsField){
  const up=(roomsField||'').toUpperCase();
  return SKIP_WORDS.some(w=>up.includes(w));
}

function mapRoom(raw){
  const r=raw.trim();
  return RM[r]||r.toLowerCase();
}

// ── main fetch + parse ────────────────────────────────────────────────────────

window.fetchAndPreview=async function(){
  document.getElementById('fetchBtn').disabled=true;
  document.getElementById('log').textContent='';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('skipSection').style.display='none';
  document.getElementById('previewSection').style.display='none';
  document.getElementById('importActions').style.display='none';
  READY_DATA=[];
  badge('Fetching…','#f59e0b');

  try{
    log('Fetching Google Sheets CSV…','info');
    const resp=await fetch(SHEET_URL);
    if(!resp.ok)throw new Error(`HTTP ${resp.status} — is the sheet public?`);
    const text=await resp.text();
    log(`  Downloaded ${(text.length/1024).toFixed(1)} KB`);

    const allRows=parseCSV(text);
    if(!allRows.length)throw new Error('CSV is empty');
    const header=allRows[0];
    log(`  ${allRows.length-1} data rows, ${header.length} columns`,'info');

    // Locate columns by header name (case-insensitive, trimmed)
    const hdr=header.map(h=>h.trim().toLowerCase());
    const col=name=>{const i=hdr.findIndex(h=>h===name.toLowerCase());return i;};

    const C={
      resNum:  col('reservation number'),
      fname:   col('first name'),
      lname:   col('last name'),
      arrival: col('arrival'),
      checkout:col('check out'),
      nights:  col('nights'),
      portalId:col('portal id'),
      source:  col('source'),
      email:   col('email'),
      adults:  col('adults'),
      children:col('child'),
      status:  col('status'),
      netPrice:col('net price'),
      total:   col('total'),
      rooms:   col('rooms'),
    };

    // Sanity check
    if(C.rooms<0||C.arrival<0||C.checkout<0)
      throw new Error('Could not find required columns in header. Sheet structure may have changed.');

    log(`  Columns mapped OK (rooms@${C.rooms}, arrival@${C.arrival}, checkout@${C.checkout})`);

    const skipped=[];
    const imported=[];
    let totalDataRows=0;

    for(let i=1;i<allRows.length;i++){
      const r=allRows[i];
      if(r.every(c=>!c.trim()))continue; // blank row
      totalDataRows++;

      const roomsRaw=(r[C.rooms]||'').trim();
      const checkoutRaw=(r[C.checkout]||'').trim();
      const arrivalRaw=(r[C.arrival]||'').trim();
      const guest=((r[C.fname]||'').trim()+' '+(r[C.lname]||'').trim()).trim();
      const checkoutISO=parseDate(checkoutRaw);
      const checkinISO=parseDate(arrivalRaw);

      // Skip: bad date
      if(!checkinISO||!checkoutISO){
        skipped.push({guest,rooms:roomsRaw,reason:'Cannot parse dates'});continue;
      }

      // Skip: checkout before cutoff
      if(checkoutISO<CUTOFF_DATE){
        skipped.push({guest,rooms:roomsRaw,reason:`Past (checkout ${checkoutISO} < ${CUTOFF_DATE})`});continue;
      }

      // Skip: VGL/fake/test rooms
      if(shouldSkip(roomsRaw)){
        skipped.push({guest,rooms:roomsRaw,reason:'Skip-word match in Rooms field'});continue;
      }

      // Parse numeric fields
      const nightsNum=parseInt(r[C.nights])||0;
      const source=SRC[(r[C.source]||'').trim().toUpperCase()]||'direct';
      const bookingId=(r[C.portalId]||'').trim();
      const email=(r[C.email]||'').trim();
      const adults=parseInt(r[C.adults])||2;
      const children=parseInt(r[C.children])||0;
      const reservationNumber=(r[C.resNum]||'').trim();

      const net=parseMoney(r[C.netPrice]||'');
      const tot=parseMoney(r[C.total]||'');
      const currency=tot.currency||net.currency||'GEL';

      // Split rooms
      const roomParts=roomsRaw.split(',').map(s=>s.trim()).filter(Boolean);
      const validRooms=roomParts.filter(rp=>!shouldSkip(rp)); // exclude any VGL room within multi-room
      if(!validRooms.length){
        skipped.push({guest,rooms:roomsRaw,reason:'All rooms matched skip-words after split'});continue;
      }
      const isMulti=validRooms.length>1;

      // Price per room per night
      // Net Price = per night for ALL rooms combined; Total = net * nights
      // Per room per night = net / numRooms (if net > 0), else total / nights / numRooms
      const nights=nightsNum||Math.max(1,Math.round(
        (new Date(checkoutISO+'T12:00:00')-new Date(checkinISO+'T12:00:00'))/86400000
      ));
      let pricePerRoomNight;
      if(net.amount>0){
        pricePerRoomNight=Math.round(net.amount/validRooms.length*100)/100;
      } else if(tot.amount>0){
        pricePerRoomNight=Math.round(tot.amount/nights/validRooms.length*100)/100;
      } else {
        pricePerRoomNight=0;
      }
      const totalPerRoom=Math.round(pricePerRoomNight*nights*100)/100;
      const totalStr=`${currency} ${isMulti?(totalPerRoom).toFixed(2):tot.amount.toFixed(2)}`;

      for(const rawRoom of validRooms){
        imported.push({
          guest,
          checkin:checkinISO,
          checkout:checkoutISO,
          nights,
          source,
          roomCode:mapRoom(rawRoom),
          currency,
          price:pricePerRoomNight,
          totalPriceStr:totalStr,
          bookingId,
          reservationNumber,
          email,
          adults,
          children,
          guests:adults+children||2,
          status:(r[C.status]||'Channel Manager').trim(),
          _isMultiRoom:isMulti,
          _rawRoom:rawRoom,
        });
      }
    }

    READY_DATA=imported;
    log(`\nParsed: ${totalDataRows} rows → ${imported.length} records to import, ${skipped.length} skipped`,'ok');

    // ── Stats bar ────────────────────────────────────────────────────────────
    const srcCounts={booking:0,airbnb:0,expedia:0,direct:0};
    imported.forEach(r=>{if(r.source in srcCounts)srcCounts[r.source]++;});
    document.getElementById('statsBar').style.display='flex';
    document.getElementById('statsBar').innerHTML=`
      <div class="stats-bar">
        <div class="stat stat-blue"><div class="stat-val">${imported.length}</div><div class="stat-lbl">Importing</div></div>
        <div class="stat stat-red"><div class="stat-val">${skipped.length}</div><div class="stat-lbl">Skipped</div></div>
        <div class="stat"><div class="stat-val">${totalDataRows}</div><div class="stat-lbl">Total rows</div></div>
        <div class="stat"><div class="stat-val" style="color:#1d4ed8;">${srcCounts.booking}</div><div class="stat-lbl">Booking</div></div>
        <div class="stat"><div class="stat-val" style="color:#be185d;">${srcCounts.airbnb}</div><div class="stat-lbl">Airbnb</div></div>
        <div class="stat"><div class="stat-val" style="color:#b45309;">${srcCounts.expedia}</div><div class="stat-lbl">Expedia</div></div>
        <div class="stat"><div class="stat-val" style="color:#15803d;">${srcCounts.direct}</div><div class="stat-lbl">Direct</div></div>
        <div class="stat"><div class="stat-val" style="color:#92400e;">${imported.filter(r=>r._isMultiRoom).length}</div><div class="stat-lbl">Multi-room splits</div></div>
      </div>`;

    // ── Skipped detail ───────────────────────────────────────────────────────
    if(skipped.length){
      const rows=skipped.map(s=>`<div class="skip-row">${s.guest||'—'} · <em>${s.rooms||'—'}</em><span class="skip-reason">${s.reason}</span></div>`).join('');
      document.getElementById('skipSection').style.display='block';
      document.getElementById('skipSection').innerHTML=`
        <details class="skip-section">
          <summary>Skipped rows (${skipped.length}) — click to expand</summary>
          <div style="margin-top:.5rem;">${rows}</div>
        </details>`;
    }

    // ── Preview table ────────────────────────────────────────────────────────
    const tableRows=imported.map((r,i)=>`<tr>
      <td style="color:#94a3b8;font-family:monospace;">${i+1}</td>
      <td style="font-weight:500;">${r.guest}${r._isMultiRoom?` <span class="pill pill-split">split</span>`:''}</td>
      <td style="font-family:monospace;">${r.checkin}</td>
      <td style="font-family:monospace;">${r.checkout}</td>
      <td>${r.nights}</td>
      <td style="font-family:monospace;font-weight:600;">${r.roomCode}</td>
      <td><span class="pill pill-${r.source}">${r.source}</span></td>
      <td style="font-family:monospace;">${r.price.toFixed(2)}</td>
      <td>${r.currency}</td>
      <td style="font-family:monospace;font-size:10px;color:#94a3b8;">${r.bookingId||'—'}</td>
    </tr>`).join('');

    document.getElementById('previewSection').style.display='block';
    document.getElementById('previewSection').innerHTML=`
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Guest</th><th>Check-in</th><th>Check-out</th><th>Nts</th>
            <th>Room</th><th>Source</th><th>Price/nt</th><th>Curr</th><th>Booking ID</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`;

    // ── Import button ────────────────────────────────────────────────────────
    document.getElementById('importActions').style.display='flex';
    document.getElementById('importActions').innerHTML=`
      <button class="btn btn-danger" id="importBtn" onclick="window.doImport()">
        🗑 Delete All + Import ${imported.length} Reservations
      </button>
      <button class="btn btn-check" onclick="verify()">Verify Firebase Count</button>
      <span id="badge2" style="font-size:13px;font-weight:600;padding:5px 12px;border-radius:5px;background:#fef3c7;color:#92400e;">
        Review the preview above, then click Import
      </span>`;

    badge(`Ready — ${imported.length} records to import`,'#16a34a');

  }catch(e){
    log('ERROR: '+e.message,'err');
    badge('Error','#dc2626');
    document.getElementById('fetchBtn').disabled=false;
  }
};

// ── Import ────────────────────────────────────────────────────────────────────

window.doImport=async function(){
  if(!READY_DATA.length){log('No data — fetch first','err');return;}
  if(!confirm(`Delete ALL existing reservations and import ${READY_DATA.length} new records from Google Sheets?\n\nThis cannot be undone.`))return;

  document.getElementById('importBtn').disabled=true;
  const b2=document.getElementById('badge2');
  if(b2){b2.textContent='Working…';b2.style.background='#f59e0b';b2.style.color='#fff';}

  try{
    log('\nStep 1 — Deleting existing reservations…','info');
    const snap=await getDocs(collection(db,'reservations'));
    log(`  Found ${snap.docs.length} existing document(s).`);
    if(snap.docs.length>0){
      await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'reservations',d.id))));
      log(`  ✓ Deleted ${snap.docs.length} reservations.`,'ok');
    }

    log(`\nStep 1b — Loading properties for propertyId resolution…`,'info');
    const propSnap=await getDocs(collection(db,'properties'));
    const propByCode={};
    propSnap.docs.forEach(d=>{
      const sc=(d.data().shortCode||'').toLowerCase();
      if(sc)propByCode[sc]=d.id;
    });
    log(`  Loaded ${propSnap.docs.length} properties (${Object.keys(propByCode).length} with shortCodes).`);

    log(`\nStep 2 — Importing ${READY_DATA.length} reservations…`,'info');
    const ts=serverTimestamp();
    let count=0, propMissed=0, noId=0;
    for(const r of READY_DATA){
      const{_isMultiRoom,_rawRoom,...data}=r; // strip internal fields
      const docId=(data.reservationNumber||'').trim();
      if(!docId){noId++;continue;}
      const resolvedPropId=propByCode[(data.roomCode||'').toLowerCase()]||'';
      if(!resolvedPropId)propMissed++;
      await setDoc(doc(db,'reservations',docId),{...data,propertyId:resolvedPropId,updatedAt:ts},{merge:true});
      count++;
      if(count%15===0||count===READY_DATA.length) log(`  Imported ${count}/${READY_DATA.length}…`);
    }
    if(noId>0)    log(`  ⚠ ${noId} reservation(s) skipped — missing reservationNumber.`,'warn');
    if(propMissed>0) log(`  ⚠ ${propMissed} reservation(s) had no matching property shortCode — propertyId left empty.`,'warn');

    log(`\nStep 3 — Verifying…`,'info');
    const check=await getDocs(collection(db,'reservations'));
    if(check.docs.length===READY_DATA.length){
      log(`\n✅ Done! ${READY_DATA.length} reservations in Firebase.`,'ok');
      log('Open SleepyPMS.html — auto-allocation runs on first snapshot.','info');
      if(b2){b2.textContent='Done ✓';b2.style.background='#16a34a';}
    } else {
      log(`⚠ Expected ${READY_DATA.length}, Firebase has ${check.docs.length}.`,'warn');
    }
  }catch(e){
    log('ERROR: '+e.message,'err');
    document.getElementById('importBtn').disabled=false;
    if(b2){b2.textContent='Error — try again';b2.style.background='#dc2626';}
  }
};

window.verify=async function(){
  log('\nVerifying Firebase…','info');
  try{
    const snap=await getDocs(collection(db,'reservations'));
    if(snap.empty) log('  Collection is EMPTY.','err');
    else log(`  ✓ ${snap.docs.length} reservation(s) in Firebase.`,'ok');
  }catch(e){log('  ERROR: '+e.message,'err');}
};

window.diagnose=async function(){
  document.getElementById('log').textContent='';
  log('=== FIREBASE DIAGNOSIS ===\n','info');
  try{
    // 1. Check reservations
    log('── Reservations ─────────────────────────','info');
    const rSnap=await getDocs(collection(db,'reservations'));
    if(rSnap.empty){
      log('  ✗ reservations collection is EMPTY — import has not run yet or failed.','err');
    } else {
      log(`  ✓ ${rSnap.docs.length} reservation document(s) found.`,'ok');
      // Inspect first document's fields
      const first=rSnap.docs[0].data();
      log('\n  Sample document fields:');
      const required=['guest','checkin','checkout','roomCode','source','price','currency'];
      required.forEach(f=>{
        const val=first[f];
        const ok=val!==undefined&&val!==null&&val!=='';
        log(`    ${ok?'✓':'✗'} ${f}: ${JSON.stringify(val)}`,ok?'ok':'err');
      });
      // Date sanity check
      const cin=first.checkin||'';
      const cout=first.checkout||'';
      const dateOk=/^\d{4}-\d{2}-\d{2}$/.test(cin)&&/^\d{4}-\d{2}-\d{2}$/.test(cout);
      log(`    ${dateOk?'✓':'✗'} Date format (YYYY-MM-DD): checkin=${cin} checkout=${cout}`,dateOk?'ok':'err');
      // Count how many have checkout >= today
      const today=new Date().toISOString().slice(0,10);
      const future=rSnap.docs.filter(d=>(d.data().checkout||'')<today);
      const current=rSnap.docs.length-future.length;
      log(`\n  ${current} reservation(s) with checkout >= ${today} (should appear in calendar)`);
      if(current===0) log('  ✗ All reservations are past — nothing to show in calendar!','err');
      // Unique room codes
      const codes=[...new Set(rSnap.docs.map(d=>d.data().roomCode||'(empty)'))].sort();
      log('\n  Room codes in Firebase: '+codes.join(', '));
    }

    // 2. Check properties
    log('\n── Properties ───────────────────────────','info');
    const pSnap=await getDocs(collection(db,'properties'));
    if(pSnap.empty){
      log('  ✗ properties collection is EMPTY!','err');
      log('  This is the most likely reason the calendar shows nothing.','err');
      log('  Fix: go to SleepyPMS.html → Properties page → click "Seed 18 rooms"','warn');
    } else {
      log(`  ✓ ${pSnap.docs.length} property document(s) found.`,'ok');
      const shortCodes=pSnap.docs.map(d=>d.data().shortCode||'(no shortCode)').sort();
      log('  shortCodes: '+shortCodes.join(', '));
      // Cross-check room codes from reservations
      if(!rSnap.empty){
        const resCodes=[...new Set(rSnap.docs.map(d=>d.data().roomCode||''))].filter(Boolean);
        const propCodes=new Set(shortCodes);
        const orphans=resCodes.filter(rc=>!propCodes.has(rc));
        if(orphans.length){
          log('\n  ✗ These roomCodes have NO matching property (will not show in calendar):','warn');
          orphans.forEach(rc=>log('    '+rc,'warn'));
        } else {
          log('  ✓ All reservation roomCodes have a matching property shortCode.','ok');
        }
      }
    }

    log('\n=== END DIAGNOSIS ===','info');
  }catch(e){
    log('ERROR: '+e.message+'\n(check browser console for details)','err');
  }
};
</script>
</body>
</html>
